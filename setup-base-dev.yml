# before you can run this base dev ansible you need to install the ansible environment:
# sudo apt update && sudo apt install -y ansible && sudo ansible --version
#
# Run on a desktop machine:
#   ansible-playbook setup-base-dev.yml --ask-become-pass
#
# Run on WSL or a headless/cloud environment (skips GUI tasks):
#   ansible-playbook setup-base-dev.yml --ask-become-pass -e wsl=true
#
# Force overwrite existing dotfiles with versions from files/:
#   ansible-playbook setup-base-dev.yml --ask-become-pass -e force_copy=true
- name: Setup Ubuntu System
  hosts: localhost
  vars:
    python_version: "3.12.9"
    node_version: "20.0.0"
    java_version: "21"
    terraform_version: "1.14.4"
    tofu_version: "1.6.2"
    fzf_version: "0.73.1"
    ansible_user: "{{ lookup('env', 'USER') }}"
    user_home: "{{ lookup('env', 'HOME') }}"
    wsl: false
    force_copy: false   # set -e force_copy=true to overwrite existing dotfiles with versions from files/
  environment:
    # Forward proxy settings from the current user's environment into all tasks,
    # including become (sudo) tasks which strip env vars by default.
    http_proxy:  "{{ lookup('env', 'http_proxy')  | default('', true) }}"
    HTTP_PROXY:  "{{ lookup('env', 'HTTP_PROXY')  | default('', true) }}"
    https_proxy: "{{ lookup('env', 'https_proxy') | default('', true) }}"
    HTTPS_PROXY: "{{ lookup('env', 'HTTPS_PROXY') | default('', true) }}"
    no_proxy:    "{{ lookup('env', 'no_proxy')    | default('', true) }}"
    NO_PROXY:    "{{ lookup('env', 'NO_PROXY')    | default('', true) }}"
  tasks:
    - import_tasks: tasks/base-packages.yml
    - import_tasks: tasks/vim.yml
    - import_tasks: tasks/java.yml
    - import_tasks: tasks/python.yml
    - import_tasks: tasks/node.yml
    - import_tasks: tasks/aws.yml
    - import_tasks: tasks/zsh.yml
      tags: zsh
    - import_tasks: tasks/terraform.yml
    - import_tasks: tasks/tofu.yml
    - import_tasks: tasks/docker.yml

    # Desktop only — skipped when running with -e wsl=true
    - import_tasks: tasks/fonts.yml
      when: not wsl
    - import_tasks: tasks/jetbrains.yml
      when: not wsl

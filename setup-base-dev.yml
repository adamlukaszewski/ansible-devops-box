# before you can run this base dev ansible you need to install the ansible environment:
# sudo apt update && sudo apt install -y ansible && sudo ansible --version
#
# Run on a desktop machine:
#   ansible-playbook setup-base-dev.yml --ask-become-pass
#
# Run on WSL or a headless/cloud environment (skips GUI tasks):
#   ansible-playbook setup-base-dev.yml --ask-become-pass -e wsl=true
- name: Setup Ubuntu System
  hosts: localhost
  vars:
    python_version: "3.12.9"
    node_version: "20.0.0"
    java_version: "21"
    terraform_version: "1.14.4"
    tofu_version: "1.6.2"
    ansible_user: "{{ lookup('env', 'USER') }}"
    user_home: "{{ lookup('env', 'HOME') }}"
    wsl: false
  tasks:
    - name: Update and upgrade apt packages
      become: yes
      apt:
        update_cache: yes
        upgrade: dist

    - name: Remove unnecessary packages
      become: yes
      apt:
        name: thunderbird*
        state: absent

    - name: Install necessary packages
      become: yes
      apt:
        name:
          - git
          - curl
          - wget
          - unzip
          - openvpn
          - vim
          - vim-gtk3
          - fonts-powerline
          - zsh
          - tmux
          - htop
          - build-essential
          - libssl-dev
          - zlib1g-dev
          - libbz2-dev
          - libreadline-dev
          - libsqlite3-dev
          - llvm
          - libncurses5-dev
          - libncursesw5-dev
          - xz-utils
          - tk-dev
          - libffi-dev
          - liblzma-dev
          - python3-openssl
          - libfuse2
          - python3-pip
          - apt-transport-https
          - ca-certificates
          - gnupg
          - lsb-release
          - openjdk-21-jdk
        state: present

    - name: Create fonts directory for user
      file:
        path: "{{ user_home }}/.local/share/fonts"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0755'

    - name: Download MesloLGS NF fonts for Powerlevel10k
      get_url:
        url: "{{ item.url }}"
        dest: "{{ user_home }}/.local/share/fonts/{{ item.name }}"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0644'
      loop:
        - { name: "MesloLGS NF Regular.ttf",     url: "https://github.com/romkatv/powerlevel10k-media/raw/master/MesloLGS%20NF%20Regular.ttf" }
        - { name: "MesloLGS NF Bold.ttf",         url: "https://github.com/romkatv/powerlevel10k-media/raw/master/MesloLGS%20NF%20Bold.ttf" }
        - { name: "MesloLGS NF Italic.ttf",       url: "https://github.com/romkatv/powerlevel10k-media/raw/master/MesloLGS%20NF%20Italic.ttf" }
        - { name: "MesloLGS NF Bold Italic.ttf",  url: "https://github.com/romkatv/powerlevel10k-media/raw/master/MesloLGS%20NF%20Bold%20Italic.ttf" }

    - name: Rebuild font cache
      shell: "fc-cache -fv {{ user_home }}/.local/share/fonts"
      environment:
        HOME: "{{ user_home }}"
      changed_when: false

    - name: Get GNOME Terminal default profile UUID
      shell: gsettings get org.gnome.Terminal.ProfilesList default | tr -d "'"
      register: gnome_terminal_profile
      changed_when: false
      when: not wsl

    - name: Set MesloLGS NF as GNOME Terminal font
      shell: |
        gsettings set org.gnome.Terminal.Legacy.Profile:/org/gnome/terminal/legacy/profiles:/:{{ gnome_terminal_profile.stdout }}/ font 'MesloLGS NF 12'
        gsettings set org.gnome.Terminal.Legacy.Profile:/org/gnome/terminal/legacy/profiles:/:{{ gnome_terminal_profile.stdout }}/ use-system-font false
      environment:
        HOME: "{{ user_home }}"
      changed_when: false
      when: not wsl

    - name: Clone VundleVim repository
      git:
        repo: 'https://github.com/VundleVim/Vundle.vim.git'
        dest: "{{ user_home }}/.vim/bundle/VundleVim"

    - name: Install Vim plugins
      shell: vim +PluginInstall +qall
      args:
        creates: "{{ user_home }}/.vim/bundle/VundleVim/autoload/vundle.vim"
      environment:
        HOME: "{{ user_home }}"

    - name: Clone jenv repository
      git:
        repo: 'https://github.com/jenv/jenv.git'
        dest: "{{ user_home }}/.jenv"
        update: yes

    - name: Ensure jenv is loaded for Ansible shell (using Zsh)
      shell: |
        export JENV_ROOT="$HOME/.jenv"
        export PATH="$JENV_ROOT/bin:$PATH"
        eval "$(jenv init -)"
        jenv --version
      environment:
        HOME: "{{ user_home }}"
      args:
        executable: /bin/zsh
      changed_when: false

    - name: Find installed Java home
      shell: |
        update-alternatives --list java | sed 's|/bin/java||' | head -n 1
      register: java_home
      changed_when: false

    - name: Add installed Java to jenv
      shell: |
        export JENV_ROOT="$HOME/.jenv"
        export PATH="$JENV_ROOT/bin:$PATH"
        eval "$(jenv init -)"
        jenv add {{ java_home.stdout }}
      args:
        creates: "{{ user_home }}/.jenv/versions"
        executable: /bin/zsh

    - name: Enable jenv export plugin (using Zsh)
      shell: |
        export JENV_ROOT="$HOME/.jenv"
        export PATH="$JENV_ROOT/bin:$PATH"
        eval "$(jenv init -)"
        jenv enable-plugin export
      args:
        executable: /bin/zsh
      changed_when: false

    - name: Set global Java version with jenv
      shell: |
        export JENV_ROOT="$HOME/.jenv"
        export PATH="$JENV_ROOT/bin:$PATH"
        eval "$(jenv init -)"
        jenv global $(jenv versions --bare | grep "^21" | head -n 1)
        jenv rehash
      args:
        executable: /bin/zsh

    - name: Verify Java version
      shell: |
        export JENV_ROOT="$HOME/.jenv"
        export PATH="$JENV_ROOT/bin:$PATH"
        eval "$(jenv init -)"
        java -version
      register: java_version_output
      changed_when: false
      args:
        executable: /bin/zsh

    - name: Display Java version
      debug:
        msg: "Java version installed: {{ java_version_output.stderr }}"

    - name: Clone pyenv repository
      git:
        repo: 'https://github.com/pyenv/pyenv.git'
        dest: "{{ user_home }}/.pyenv"
        update: yes

    - name: Install Python using pyenv
      shell: |
        export PYENV_ROOT="$HOME/.pyenv"
        export PATH="$PYENV_ROOT/bin:$PATH"
        eval "$(pyenv init --path)"
        pyenv install {{ python_version }}
        pyenv global {{ python_version }}
      args:
        creates: "{{ user_home }}/.pyenv/versions/{{ python_version }}"
      environment:
        HOME: "{{ user_home }}"

    - name: Install Poetry using pyenv's Python
      shell: |
        export PYENV_ROOT="$HOME/.pyenv"
        export PATH="$PYENV_ROOT/bin:$PATH"
        eval "$(pyenv init --path)"
        $(pyenv which pip) install --user poetry
      environment:
        HOME: "{{ user_home }}"
      args:
        creates: "{{ user_home }}/.local/bin/poetry"

    - name: Configure Poetry to not create virtualenvs inside project directories
      shell: "{{ user_home }}/.local/bin/poetry config virtualenvs.in-project false"
      environment:
        PATH: "{{ user_home }}/.local/bin:{{ ansible_env.PATH }}"
        HOME: "{{ user_home }}"
      changed_when: false

    - name: Verify Poetry installation
      shell: "{{ user_home }}/.local/bin/poetry --version"
      register: poetry_version
      changed_when: false

    - name: Display Poetry version
      debug:
        msg: "Poetry version installed: {{ poetry_version.stdout }}"

    - name: Install Hatch using pyenv's Python
      shell: |
        export PYENV_ROOT="$HOME/.pyenv"
        export PATH="$PYENV_ROOT/bin:$PATH"
        eval "$(pyenv init --path)"
        $(pyenv which pip) install --user hatch
      environment:
        HOME: "{{ user_home }}"
      args:
        creates: "{{ user_home }}/.local/bin/hatch"

    - name: Verify Hatch installation
      shell: "{{ user_home }}/.local/bin/hatch --version"
      register: hatch_version
      changed_when: false

    - name: Display Hatch version
      debug:
        msg: "Hatch version installed: {{ hatch_version.stdout }}"

    - name: Clone nodenv repository
      git:
        repo: 'https://github.com/nodenv/nodenv.git'
        dest: "{{ user_home }}/.nodenv"
        update: yes

    - name: Install node-build plugin for nodenv (force fetch to avoid tag conflicts)
      git:
        repo: 'https://github.com/nodenv/node-build.git'
        dest: "{{ user_home }}/.nodenv/plugins/node-build"
        version: master
        force: yes
        update: yes

    - name: Install Node.js using nodenv
      shell: |
        export NODENV_ROOT="$HOME/.nodenv"
        export PATH="$NODENV_ROOT/bin:$NODENV_ROOT/shims:$PATH"
        eval "$(nodenv init -)"
        nodenv install {{ node_version }}
        nodenv global {{ node_version }}
        nodenv rehash
      args:
        creates: "{{ user_home }}/.nodenv/versions/{{ node_version }}"

    - name: Verify Node.js installation
      shell: |
        export NODENV_ROOT="$HOME/.nodenv"
        export PATH="$NODENV_ROOT/bin:$NODENV_ROOT/shims:$PATH"
        eval "$(nodenv init -)"
        node --version
      register: node_version_output
      changed_when: false

    - name: Display Node.js version
      debug:
        msg: "Node.js version installed: {{ node_version_output.stdout }}"

    - name: Install AWS CDK globally using npm
      shell: |
        export NODENV_ROOT="$HOME/.nodenv"
        export PATH="$NODENV_ROOT/bin:$NODENV_ROOT/shims:$PATH"
        eval "$(nodenv init -)"
        npm install -g aws-cdk
      args:
        creates: "{{ user_home }}/.nodenv/versions/{{ node_version }}/lib/node_modules/aws-cdk"

    - name: Install AWS CLI v2
      become: yes
      shell: |
        curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "/tmp/awscliv2.zip"
        unzip /tmp/awscliv2.zip -d /tmp
        /tmp/aws/install
      args:
        creates: "/usr/local/bin/aws"

    - name: Cleanup AWS CLI installer files
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /tmp/awscliv2.zip
        - /tmp/aws

    - name: Verify AWS CLI installation
      shell: "aws --version"
      register: aws_cli_version
      changed_when: false

    - name: Display AWS CLI version
      debug:
        msg: "AWS CLI version installed: {{ aws_cli_version.stdout }}"

    - name: Install CZG (commitizen) globally using npm
      shell: |
        export NODENV_ROOT="$HOME/.nodenv"
        export PATH="$NODENV_ROOT/bin:$NODENV_ROOT/shims:$PATH"
        eval "$(nodenv init -)"
        npm install -g czg
      args:
        creates: "{{ user_home }}/.nodenv/versions/{{ node_version }}/lib/node_modules/czg"

    - name: Verify CZG (commitizen) installation
      shell: |
        export NODENV_ROOT="$HOME/.nodenv"
        export PATH="$NODENV_ROOT/bin:$NODENV_ROOT/shims:$PATH"
        eval "$(nodenv init -)"
        nodenv rehash
        czg --version
      register: czg_cli_version
      changed_when: false
      environment:
        HOME: "{{ user_home }}"

    - name: Display CZG (commitizen) version
      debug:
        msg: "CZG (commitizen) version installed: {{ czg_cli_version.stdout }}"

    - name: Copy prepared .czgrc to user's home directory
      copy:
        src: files/czrc
        dest: "{{ user_home }}/.czgrc"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0644'

    - name: Create .antigen directory
      file:
        path: "{{ user_home }}/.antigen"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0755'

    - name: Clone Antigen repository
      git:
        repo: 'https://github.com/zsh-users/antigen.git'
        dest: "{{ user_home }}/.antigen/antigen"
        version: master

    - name: Copy prepared .zshrc to user's home directory
      copy:
        src: files/zshrc
        dest: "{{ user_home }}/.zshrc"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0644'

    - name: Copy prepared .p10k.zsh to user's home directory
      copy:
        src: files/.p10k.zsh
        dest: "{{ user_home }}/.p10k.zsh"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0644'

    - name: Install fzf from GitHub
      git:
        repo: 'https://github.com/junegunn/fzf.git'
        dest: "{{ user_home }}/.fzf"
        version: master

    - name: Run fzf install script
      shell: "{{ user_home }}/.fzf/install --all"
      args:
        chdir: "{{ user_home }}/.fzf"
        creates: "{{ user_home }}/.fzf/bin/fzf"

    - name: Set Zsh as default shell
      become: yes
      user:
        name: "{{ ansible_user }}"
        shell: /usr/bin/zsh

    - name: Get latest IntelliJ Toolbox download URL
      uri:
        url: https://data.services.jetbrains.com/products/releases?code=TBA&latest=true&type=release
        return_content: yes
      register: toolbox_release

    - name: Set IntelliJ Toolbox download URL
      set_fact:
        toolbox_download_url: "{{ toolbox_release.json.TBA[0].downloads.linux.link }}"

    - name: Download IntelliJ Toolbox
      become: yes
      get_url:
        url: "{{ toolbox_download_url }}"
        dest: "/tmp/jetbrains-toolbox.tar.gz"

    - name: Extract IntelliJ Toolbox
      become: yes
      unarchive:
        src: "/tmp/jetbrains-toolbox.tar.gz"
        dest: "/opt/"
        remote_src: yes

    - name: Find extracted IntelliJ Toolbox directory
      shell: "ls -d /opt/jetbrains-toolbox-*"
      register: toolbox_dir
      changed_when: false

    - name: Install IntelliJ Toolbox
      shell: "{{ toolbox_dir.stdout }}/bin/jetbrains-toolbox"
      args:
        creates: "{{ user_home }}/.local/share/JetBrains/Toolbox"

    - name: Cleanup IntelliJ Toolbox installer
      become: yes
      file:
        path: "/tmp/jetbrains-toolbox.tar.gz"
        state: absent

    - name: Clone tfenv repository
      git:
        repo: 'https://github.com/tfutils/tfenv.git'
        dest: "{{ user_home }}/.tfenv"
        update: yes

    - name: Create symlinks for tfenv
      become: yes
      file:
        src: "{{ user_home }}/.tfenv/bin/{{ item }}"
        dest: "/usr/local/bin/{{ item }}"
        state: link
      loop:
        - tfenv
        - terraform

    - name: Install Terraform {{ terraform_version }} using tfenv
      shell: |
        export PATH="$HOME/.tfenv/bin:$PATH"
        tfenv install {{ terraform_version }}
      args:
        creates: "{{ user_home }}/.tfenv/versions/{{ terraform_version }}"

    - name: Set Terraform {{ terraform_version }} as global version
      shell: |
        export PATH="$HOME/.tfenv/bin:$PATH"
        tfenv use {{ terraform_version }}

    - name: Verify Terraform version
      shell: terraform --version
      register: terraform_version_output
      changed_when: false

    - name: Display Terraform version
      debug:
        msg: "Terraform version installed: {{ terraform_version_output.stdout }}"

    - name: Clone tofuenv repository
      git:
        repo: 'https://github.com/tofuutils/tofuenv.git'
        dest: "{{ user_home }}/.tofuenv"
        update: yes

    - name: Create symlinks for tofuenv
      become: yes
      file:
        src: "{{ user_home }}/.tofuenv/bin/{{ item }}"
        dest: "/usr/local/bin/{{ item }}"
        state: link
      loop:
        - tofuenv
        - tofu

    - name: Install OpenTofu {{ tofu_version }} using tofuenv
      shell: |
        export PATH="$HOME/.tofuenv/bin:$PATH"
        tofuenv install {{ tofu_version }}
      args:
        creates: "{{ user_home }}/.tofuenv/versions/{{ tofu_version }}"

    - name: Set OpenTofu {{ tofu_version }} as global version
      shell: |
        export PATH="$HOME/.tofuenv/bin:$PATH"
        tofuenv use {{ tofu_version }}

    - name: Verify OpenTofu version
      shell: tofu --version
      register: tofu_version_output
      changed_when: false

    - name: Display OpenTofu version
      debug:
        msg: "OpenTofu version installed: {{ tofu_version_output.stdout }}"

    - name: Remove old versions of Docker if present
      become: yes
      apt:
        name:
          - docker
          - docker-engine
          - docker.io
          - containerd
          - runc
        state: absent

    - name: Add Docker's official GPG key
      become: yes
      shell: |
        curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /usr/share/keyrings/docker-archive-keyring.gpg
      args:
        creates: /usr/share/keyrings/docker-archive-keyring.gpg

    - name: Set up Docker APT repository
      become: yes
      shell: |
        echo \
        "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/docker-archive-keyring.gpg] https://download.docker.com/linux/ubuntu \
        $(lsb_release -cs) stable" | tee /etc/apt/sources.list.d/docker.list > /dev/null
      args:
        creates: /etc/apt/sources.list.d/docker.list

    - name: Update apt cache after adding Docker repo
      become: yes
      apt:
        update_cache: yes

    - name: Install Docker Engine, CLI, and Containerd
      become: yes
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
        state: present

    - name: Ensure Docker service is started and enabled
      become: yes
      systemd:
        name: docker
        state: started
        enabled: yes

    - name: Add user to Docker group
      become: yes
      user:
        name: "{{ ansible_user }}"
        groups: docker
        append: yes

    - name: Verify Docker installation
      shell: docker --version
      register: docker_version
      changed_when: false

    - name: Display Docker version
      debug:
        msg: "Docker version installed: {{ docker_version.stdout }}"

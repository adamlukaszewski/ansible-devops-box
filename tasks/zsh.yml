- name: Create .antigen directory
  file:
    path: "{{ user_home }}/.antigen"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0755'

- name: Clone Antigen repository
  git:
    repo: 'https://github.com/zsh-users/antigen.git'
    dest: "{{ user_home }}/.antigen/antigen"
    version: master

- name: Copy prepared .zshrc to user's home directory
  copy:
    src: files/zshrc
    dest: "{{ user_home }}/.zshrc"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0644'
    force: "{{ force_copy }}"

- name: Copy prepared .p10k.zsh to user's home directory
  copy:
    src: files/.p10k.zsh
    dest: "{{ user_home }}/.p10k.zsh"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0644'
    force: "{{ force_copy }}"

- name: Install fzf from GitHub
  git:
    repo: 'https://github.com/junegunn/fzf.git'
    dest: "{{ user_home }}/.fzf"
    version: "v{{ fzf_version }}"
  register: fzf_git

- name: Remove fzf binaries to force reinstall on version change
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - "{{ user_home }}/.fzf/bin/fzf"
    - "{{ user_home }}/bin/fzf"
  when: fzf_git.changed

- name: Run fzf install script
  shell: "{{ user_home }}/.fzf/install --key-bindings --completion --no-update-rc"
  args:
    chdir: "{{ user_home }}/.fzf"
  when: fzf_git.changed

- name: Set Zsh as default shell
  become: yes
  user:
    name: "{{ ansible_user }}"
    shell: /usr/bin/zsh
